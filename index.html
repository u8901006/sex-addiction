<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sex Addiction Daily</title>
<meta name="description" content="性成癮/強迫性性行為障礙研究文獻每日彙整"/>
<style>
  :root { --bg: #f6f1e8; --surface: #fffaf2; --line: #d8c5ab; --text: #2b2118; --muted: #766453; --accent: #8c4f2b; --accent-soft: #ead2bf; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: radial-gradient(circle at top, #fff6ea 0, var(--bg) 55%, #ead8c6 100%); color: var(--text); font-family: "Noto Sans TC", "PingFang TC", "Helvetica Neue", Arial, sans-serif; min-height: 100vh; }
  .container { max-width: 640px; margin: 0 auto; padding: 120px 24px; text-align: center; }
  .logo { font-size: 64px; margin-bottom: 24px; }
  h1 { font-size: 28px; color: var(--text); margin-bottom: 12px; }
  .subtitle { color: var(--accent); font-size: 16px; margin-bottom: 32px; }
  .info { color: var(--muted); font-size: 14px; line-height: 1.8; }
  .links-section { margin-top: 48px; }
  .links-section a { display: inline-block; padding: 12px 24px; margin: 8px; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; color: var(--text); text-decoration: none; transition: all 0.2s; }
  .links-section a:hover { background: var(--accent-soft); border-color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">🔬</div>
  <h1>Sex Addiction Daily</h1>
  <p class="subtitle">性成癮/強迫性性行為障礙文獻日報</p>
  <p class="info">首次執行將由 GitHub Actions 自動生成日報。<br/>請手動觸發 workflow 或等待每日 22:50 (CST) 定時執行。</p>
  <div class="links-section">
    <a href="https://www.leepsyclinic.com/" target="_blank">🏥 李政洋身心診所首頁</a>
    <a href="https://blog.leepsyclinic.com/" target="_blank">📨 訂閱電子報</a>
    <a href="https://buymeacoffee.com/CYlee" target="_blank">☕ Buy me a coffee</a>
  </div>
</div>
</body>
</html>
